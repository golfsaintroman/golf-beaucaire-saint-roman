<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golf Saint-Roman — Chrono</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a3d0f;--gmid:#2d6318;--glight:#4a8c28;--gpale:#e8f2e0;
  --gold:#b8913a;--glold:#d4b06a;--cream:#f7f3ec;--white:#fff;
  --text:#1c1c1c;--muted:#6b6b6b;--border:#e0e0e0;
  --warn:#e8a020;--danger:#c0392b;--ok:#2d6318;
}
html,body{min-height:100vh;font-family:"DM Sans",sans-serif;background:var(--green);color:var(--text);overflow-x:hidden}

/* BG texture */
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(74,140,40,0.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(184,145,58,0.15) 0%,transparent 60%);pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem 2rem}

/* HEADER */
.hdr{text-align:center;margin-bottom:2rem}
.logo-ring{width:72px;height:72px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 0 0 4px rgba(184,145,58,0.4),0 8px 32px rgba(0,0,0,0.4)}
.logo-ring img{width:60px;height:60px;border-radius:50%;object-fit:contain}
.title{font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:600;color:var(--glold);letter-spacing:.05em}
.subtitle{font-size:.75rem;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:.2rem}

/* CARD */
.card{width:100%;max-width:420px;background:var(--white);border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}

/* HOLE BANNER */
.hole-banner{padding:1.4rem 1.5rem 1rem;position:relative;overflow:hidden}
.hole-banner::before{content:"";position:absolute;inset:0;opacity:.12}
.hb-start{background:linear-gradient(135deg,#1a3d0f,#2d6318)}
.hb-check{background:linear-gradient(135deg,#1a4a6b,#2471a3)}
.hb-warn{background:linear-gradient(135deg,#6b4a00,#e8a020)}
.hb-danger{background:linear-gradient(135deg,#6b0000,#c0392b)}
.hb-finish{background:linear-gradient(135deg,#5a3800,#b8913a)}

.hole-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.3rem}
.hole-num{font-family:"Cormorant Garamond",serif;font-size:3.5rem;font-weight:700;color:white;line-height:1;display:flex;align-items:baseline;gap:.4rem}
.hole-num span{font-size:1rem;font-weight:400;opacity:.7;font-family:"DM Sans",sans-serif}
.hole-icon{position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);font-size:3.5rem;opacity:.2}

/* TIME DISPLAY */
.time-block{padding:1.2rem 1.5rem;border-bottom:1px solid #f0f0f0}
.time-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.time-lbl{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.time-val{font-family:"Cormorant Garamond",serif;font-size:2.8rem;font-weight:700;line-height:1}
.time-val.ok{color:var(--ok)}
.time-val.warn{color:var(--warn)}
.time-val.danger{color:var(--danger)}
.time-val.gold{color:var(--gold)}

/* PROGRESS BAR */
.prog-wrap{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-bottom:.5rem}
.prog-bar{height:100%;border-radius:4px;transition:width .8s ease,background .5s}
.prog-bar.ok{background:linear-gradient(90deg,var(--glight),var(--gmid))}
.prog-bar.warn{background:linear-gradient(90deg,#d4a017,var(--warn))}
.prog-bar.danger{background:linear-gradient(90deg,#900,var(--danger))}
.prog-bar.gold{background:linear-gradient(90deg,#c9a84c,var(--gold))}

.ref-line{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted)}

/* STATUS MESSAGE */
.msg-block{padding:1.1rem 1.5rem}
.msg-icon{font-size:2rem;margin-bottom:.5rem;text-align:center}
.msg-status{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;text-align:center;margin-bottom:.4rem;font-weight:600}
.msg-status.ok{color:var(--ok)}
.msg-status.warn{color:var(--warn)}
.msg-status.danger{color:var(--danger)}
.msg-status.gold{color:var(--gold)}
.msg-text{font-family:"Cormorant Garamond",serif;font-size:1.25rem;font-weight:600;color:var(--text);text-align:center;line-height:1.35}
.msg-sub{font-size:.78rem;color:var(--muted);text-align:center;margin-top:.4rem;line-height:1.4}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#f0f0f0;border-top:1px solid #f0f0f0}
.stat{background:white;padding:.85rem 1rem;text-align:center}
.stat-lbl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.stat-val{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:600;color:var(--text)}
.stat-val.ok{color:var(--ok)}
.stat-val.warn{color:var(--warn)}
.stat-val.danger{color:var(--danger)}
.stat-val.gold{color:var(--gold)}

/* TROUS DOTS */
.trous-block{padding:.9rem 1.5rem;border-top:1px solid #f0f0f0;display:flex;align-items:center;gap:.4rem;justify-content:center;flex-wrap:wrap}
.trou-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;transition:.3s}
.trou-dot.past{background:var(--gpale);color:var(--green);border:2px solid var(--glight)}
.trou-dot.active{background:var(--green);color:white;border:2px solid var(--green);transform:scale(1.2);box-shadow:0 2px 10px rgba(26,61,15,.4)}
.trou-dot.future{background:#f5f5f5;color:#bbb;border:2px solid #e8e8e8}
.trou-dot.checkpoint{background:var(--gold);color:white;border:2px solid var(--gold)}
.trou-dot.checkpoint.past{background:#c9a84c22;color:var(--gold);border-color:var(--gold)}

/* NO START */
.no-start{padding:1.5rem;text-align:center}
.no-start-icon{font-size:2.5rem;margin-bottom:.75rem}
.no-start-t{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:600;color:var(--text);margin-bottom:.4rem}
.no-start-s{font-size:.8rem;color:var(--muted);line-height:1.4}

/* RESET BTN */
.reset-btn{display:block;width:calc(100% - 3rem);margin:0 1.5rem 1.5rem;padding:.75rem;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:.78rem;color:var(--muted);cursor:pointer;font-family:"DM Sans",sans-serif;text-align:center;transition:.2s}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

/* FOOTER */
.foot{margin-top:1.5rem;text-align:center;font-size:.68rem;color:rgba(255,255,255,.3);letter-spacing:.1em}

/* PULSE ANIM */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease forwards}

/* QR PAGE */
#qr-page{display:none;position:fixed;inset:0;background:var(--green);z-index:100;overflow-y:auto;padding:1.5rem 1rem 2rem}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:440px;margin:1rem auto 0}
.qr-card{background:white;border-radius:16px;padding:1rem;text-align:center}
.qr-card canvas{border-radius:8px}
.qr-title{font-family:"Cormorant Garamond",serif;font-size:.95rem;font-weight:600;color:var(--green);margin-top:.5rem}
.qr-url{font-size:.6rem;color:var(--muted);word-break:break-all;margin-top:.2rem}
.qr-close{display:block;width:100%;max-width:440px;margin:1.5rem auto 0;padding:.85rem;background:rgba(255,255,255,.15);color:white;border:1.5px solid rgba(255,255,255,.3);border-radius:12px;font-size:.88rem;cursor:pointer;font-family:"DM Sans",sans-serif}
.qr-btn{display:block;margin:.5rem auto 0;font-size:.7rem;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;text-decoration:underline}
</style>
</head>
<body>

<div class="wrap" id="main-wrap">
  <a href="index.html" style="text-decoration:none">
  <div class="hdr">
    <div class="logo-ring">
      <img id="logo-img" alt="Golf Saint-Roman">
    </div>
    <div class="title">Golf Saint-Roman</div>
    <div class="subtitle">Beaucaire · Gard</div>
  </div>
  </a>

  <div class="card fade-in" id="card">
    <!-- contenu injecté par JS -->
  </div>

  <div class="foot" id="foot-links">
    <button class="qr-btn" style="color:rgba(255,255,255,.3)" onclick="showQR()">⚙ Afficher les QR codes</button>
  </div>
</div>

<!-- PAGE QR -->
<div id="qr-page">
  <div style="text-align:center">
    <div class="title" style="color:var(--glold)">QR Codes du parcours</div>
    <div class="subtitle" style="margin-top:.3rem">À imprimer et placer sur chaque trou</div>
  </div>
  <div class="qr-grid" id="qr-grid"></div>
  <button class="qr-close" onclick="hideQR()">← Retour au chrono</button>
</div>

<script>
// =====================
// DONNÉES DU PARCOURS
// =====================
const T = [
  {n:1,p:3,h:15,j:100,r:83,o:51},
  {n:2,p:3,h:3,j:101,r:80,o:50},
  {n:3,p:3,h:11,j:103,r:86,o:66},
  {n:4,p:3,h:7,j:139,r:93,o:51},
  {n:5,p:3,h:17,j:79,r:68,o:68},
  {n:6,p:3,h:13,j:104,r:83,o:83},
  {n:7,p:4,h:5,j:193,r:128,o:90},
  {n:8,p:3,h:1,j:100,r:69,o:69},
  {n:9,p:4,h:9,j:249,r:214,o:71}
];

// Checkpoints : trou → temps idéal cumulé en secondes
// Total 96 min = 5760s
// T1=0, T3=32min=1920s, T6=64min=3840s, T9=96min=5760s
const CHECKPOINTS = {
  1: { ref: 0,    label: "Départ",        next: "Prochain checkpoint : Trou 3" },
  3: { ref: 1920, label: "Checkpoint 1",  next: "Prochain checkpoint : Trou 6" },
  6: { ref: 3840, label: "Checkpoint 2",  next: "Prochain checkpoint : Trou 9" },
  9: { ref: 5760, label: "Arrivée",       next: "Fin du parcours" }
};

const MARGIN_OK   = 3 * 60;  // ±3 min → dans les temps
const MARGIN_WARN = 8 * 60;  // ±8 min → léger retard

// Messages bienveillants
function getMessage(trou, delta) {
  if (trou === 1) return {
    icon: "⛳", status: "ok", statusTxt: "C'est parti !",
    text: "Bonne partie, profitez de chaque coup !",
    sub: "Votre chrono est lancé. À vous de jouer !"
  };
  if (trou === 9) {
    if (delta <= -MARGIN_OK) return {
      icon: "🏆", status: "gold", statusTxt: "Superbe rythme !",
      text: "Vous avez terminé en avance — bravo !",
      sub: "Le parcours n'a eu aucun secret pour vous aujourd'hui."
    };
    if (delta <= MARGIN_OK) return {
      icon: "✅", status: "ok", statusTxt: "Dans les temps !",
      text: "Parfait, vous avez respecté le rythme idéal.",
      sub: "Merci pour votre courtoisie envers les autres joueurs."
    };
    if (delta <= MARGIN_WARN) return {
      icon: "🌿", status: "warn", statusTxt: "Légèrement dépassé",
      text: "Un petit peu au-delà du temps imparti, mais rien de grave.",
      sub: "Pensez-y lors de votre prochaine partie !"
    };
    return {
      icon: "⏰", status: "danger", statusTxt: "Temps dépassé",
      text: "Le parcours a pris plus de temps que prévu.",
      sub: "Merci de penser aux joueurs qui vous suivent la prochaine fois."
    };
  }
  // Checkpoints intermédiaires
  if (delta < -MARGIN_WARN) return {
    icon: "🚀", status: "ok", statusTxt: "Excellent rythme !",
    text: "Vous êtes largement en avance — vous gérez !",
    sub: CHECKPOINTS[trou].next
  };
  if (delta < -MARGIN_OK) return {
    icon: "⚡", status: "ok", statusTxt: "En avance",
    text: "Vous avancez bien, le parcours est à votre rythme.",
    sub: CHECKPOINTS[trou].next
  };
  if (delta <= MARGIN_OK) return {
    icon: "🎯", status: "ok", statusTxt: "Dans les temps !",
    text: "Parfait, vous respectez le tempo du parcours.",
    sub: CHECKPOINTS[trou].next
  };
  if (delta <= MARGIN_WARN) return {
    icon: "🌿", status: "warn", statusTxt: "Léger retard",
    text: "Vous prenez un peu de temps — pensez à conclure les trous.",
    sub: CHECKPOINTS[trou].next
  };
  return {
    icon: "⏰", status: "danger", statusTxt: "Retard important",
    text: "Pensez aux joueurs derrière vous et accélérez le rythme.",
    sub: CHECKPOINTS[trou].next
  };
}

function fmt(sec) {
  const m = Math.floor(Math.abs(sec) / 60);
  const s = Math.abs(sec) % 60;
  return (sec < 0 ? "-" : "") + m + ":" + (s < 10 ? "0" : "") + s;
}
function fmtMin(sec) {
  const m = Math.floor(Math.abs(sec) / 60);
  const s = Math.abs(sec) % 60;
  const sign = sec < 0 ? "-" : "+";
  if (m === 0) return sign + s + "s";
  return sign + m + "min" + (s > 0 ? s + "s" : "");
}

// =====================
// LECTURE PARAMÈTRE URL
// =====================
const params = new URLSearchParams(window.location.search);
const trou = parseInt(params.get("trou")) || 0;

const card = document.getElementById("card");

function renderTrouDots(activeTrou) {
  const checks = [1, 3, 6, 9];
  let h = '<div class="trous-block">';
  for (let i = 1; i <= 9; i++) {
    const isActive = i === activeTrou;
    const isPast = i < activeTrou;
    const isCheck = checks.includes(i);
    let cls = isActive ? "active" : (isPast ? "past" : "future");
    if (isCheck) cls += " checkpoint";
    h += `<div class="trou-dot ${cls}">${i}</div>`;
  }
  h += '</div>';
  return h;
}

// =====================
// CAS 1 : TROU 1 — DÉPART
// =====================
if (trou === 1) {
  const startTime = Date.now();
  localStorage.setItem("gsr_start", startTime);
  localStorage.removeItem("gsr_done");

  card.innerHTML = `
    <div class="hole-banner hb-start">
      <div class="hole-label">Trou</div>
      <div class="hole-num">1 <span>Départ</span></div>
      <div class="hole-icon">⛳</div>
    </div>
    <div class="msg-block">
      <div class="msg-icon pulse">🏌️</div>
      <div class="msg-status ok">Chrono lancé !</div>
      <div class="msg-text">Bonne partie, profitez de chaque coup !</div>
      <div class="msg-sub">Votre chrono est lancé. À vous de jouer !<br>Prochain checkpoint au <strong>Trou 3</strong>.</div>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-lbl">Départ</div>
        <div class="stat-val ok" id="heure-depart">--:--</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Objectif fin</div>
        <div class="stat-val" id="heure-fin">--:--</div>
      </div>
    </div>
    ${renderTrouDots(1)}
  `;

  // Afficher l'heure de départ
  const d = new Date(startTime);
  const h2 = d.getHours().toString().padStart(2,"0");
  const m2 = d.getMinutes().toString().padStart(2,"0");
  document.getElementById("heure-depart").textContent = h2 + ":" + m2;
  const fin = new Date(startTime + 96 * 60 * 1000);
  const hf = fin.getHours().toString().padStart(2,"0");
  const mf = fin.getMinutes().toString().padStart(2,"0");
  document.getElementById("heure-fin").textContent = hf + ":" + mf;
}

// =====================
// CAS 2 : CHECKPOINT (trou 3, 6, 9)
// =====================
else if (CHECKPOINTS[trou]) {
  const startRaw = localStorage.getItem("gsr_start");

  if (!startRaw) {
    // Pas de départ enregistré
    card.innerHTML = `
      <div class="hole-banner hb-check">
        <div class="hole-label">Trou</div>
        <div class="hole-num">${trou} <span>Checkpoint</span></div>
        <div class="hole-icon">📍</div>
      </div>
      <div class="no-start">
        <div class="no-start-icon">⚠️</div>
        <div class="no-start-t">Aucun départ enregistré</div>
        <div class="no-start-s">Scannez d'abord le QR code du <strong>Trou 1</strong> pour lancer le chrono.</div>
      </div>
      ${renderTrouDots(trou)}
    `;
  } else {
    const startTime = parseInt(startRaw);
    const now = Date.now();
    const elapsed = Math.floor((now - startTime) / 1000); // secondes écoulées
    const ref = CHECKPOINTS[trou].ref;
    const delta = elapsed - ref; // positif = en retard, négatif = en avance
    const msg = getMessage(trou, delta);

    const isFinish = trou === 9;
    if (isFinish) localStorage.setItem("gsr_done", "1");

    // Calcul barre de progression
    const totalRef = 5760;
    let pct = Math.min(Math.round((elapsed / totalRef) * 100), 110);
    const barClass = msg.status === "gold" ? "gold" : msg.status;

    // Classe bannière
    const bannerMap = {ok:"hb-check", warn:"hb-warn", danger:"hb-danger", gold:"hb-finish"};
    const bannerCls = bannerMap[msg.status] || "hb-check";

    const deltaStr = delta === 0 ? "Dans les temps" : fmtMin(delta) + (delta < 0 ? " d'avance" : " de retard");

    card.innerHTML = `
      <div class="hole-banner ${bannerCls}">
        <div class="hole-label">${isFinish ? "Arrivée" : "Checkpoint"}</div>
        <div class="hole-num">${trou} <span>${isFinish ? "Fin du parcours" : CHECKPOINTS[trou].label}</span></div>
        <div class="hole-icon">${isFinish ? "🏁" : "📍"}</div>
      </div>
      <div class="time-block">
        <div class="time-row">
          <div class="time-lbl">Temps écoulé</div>
          <div class="time-val ${msg.status}">${fmt(elapsed)}</div>
        </div>
        <div class="prog-wrap">
          <div class="prog-bar ${barClass}" style="width:${Math.min(pct,100)}%"></div>
        </div>
        <div class="ref-line">
          <span>Départ</span>
          <span>Objectif : ${fmt(ref)}</span>
          <span>1h36</span>
        </div>
      </div>
      <div class="msg-block">
        <div class="msg-icon">${msg.icon}</div>
        <div class="msg-status ${msg.status}">${msg.statusTxt}</div>
        <div class="msg-text">${msg.text}</div>
        <div class="msg-sub">${msg.sub}</div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-lbl">Écart</div>
          <div class="stat-val ${msg.status}">${deltaStr}</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">${isFinish ? "Temps total" : "Temps restant"}</div>
          <div class="stat-val">${isFinish ? fmt(elapsed) : fmt(Math.max(0, totalRef - elapsed))}</div>
        </div>
      </div>
      ${renderTrouDots(trou)}
      ${isFinish ? '<button class="reset-btn" onclick="resetChrono()">🔄 Réinitialiser pour une nouvelle partie</button>' : ''}
    `;
  }
}

// =====================
// CAS 3 : PAGE D'ACCUEIL (pas de paramètre)
// =====================
else {
  const hasStart = !!localStorage.getItem("gsr_start");
  const elapsed = hasStart ? Math.floor((Date.now() - parseInt(localStorage.getItem("gsr_start"))) / 1000) : 0;
  const pct = hasStart ? Math.min(Math.round((elapsed / 5760) * 100), 100) : 0;
  const stClass = elapsed > 5760 + 480 ? "danger" : elapsed > 5760 ? "warn" : "ok";

  card.innerHTML = `
    <div class="hole-banner hb-start">
      <div class="hole-label">Parcours</div>
      <div class="hole-num">9 <span>trous · Par 29</span></div>
      <div class="hole-icon">🏌️</div>
    </div>
    ${hasStart ? `
    <div class="time-block">
      <div class="time-row">
        <div class="time-lbl">Partie en cours</div>
        <div class="time-val ${stClass}" id="live-time">${fmt(elapsed)}</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar ${stClass}" id="live-bar" style="width:${pct}%"></div>
      </div>
      <div class="ref-line"><span>0:00</span><span>Objectif 1h36</span><span>1:36:00</span></div>
    </div>` : ""}
    <div class="msg-block">
      <div class="msg-icon">⛳</div>
      <div class="msg-status ok">Système de chronomètre</div>
      <div class="msg-text">Scannez le QR code de chaque trou pour suivre votre rythme</div>
      <div class="msg-sub">
        <strong>Trou 1</strong> — Lance le chrono<br>
        <strong>Trou 3</strong> — Checkpoint 1<br>
        <strong>Trou 6</strong> — Checkpoint 2<br>
        <strong>Trou 9</strong> — Bilan final
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Parcours</div><div class="stat-val">9 trous</div></div>
      <div class="stat"><div class="stat-lbl">Objectif</div><div class="stat-val">1h 36min</div></div>
    </div>
    ${renderTrouDots(0)}
    ${hasStart ? '<button class="reset-btn" onclick="resetChrono()">🔄 Réinitialiser le chrono</button>' : ''}
  `;

  // Live clock si partie en cours
  if (hasStart) {
    setInterval(() => {
      const el = Math.floor((Date.now() - parseInt(localStorage.getItem("gsr_start"))) / 1000);
      const p = Math.min(Math.round((el / 5760) * 100), 100);
      const sc = el > 5760 + 480 ? "danger" : el > 5760 ? "warn" : "ok";
      const tv = document.getElementById("live-time");
      const bv = document.getElementById("live-bar");
      if (tv) { tv.textContent = fmt(el); tv.className = "time-val " + sc; }
      if (bv) { bv.style.width = p + "%"; bv.className = "prog-bar " + sc; }
    }, 1000);
  }
}

function resetChrono() {
  if (confirm("Réinitialiser le chrono pour une nouvelle partie ?")) {
    localStorage.removeItem("gsr_start");
    localStorage.removeItem("gsr_done");
    window.location.href = window.location.pathname;
  }
}

// =====================
// QR CODES
// =====================
function showQR() {
  document.getElementById("qr-page").style.display = "block";
  generateQRCodes();
}
function hideQR() {
  document.getElementById("qr-page").style.display = "none";
}

function generateQRCodes() {
  const grid = document.getElementById("qr-grid");
  if (grid.children.length > 0) return; // déjà généré

  const base = 'https://golfsaintroman.github.io/golf-beaucaire-saint-roman/timer.html';
  const holes = [
    {trou: 1, label: "Trou 1 — Départ", color: "#1a3d0f"},
    {trou: 3, label: "Trou 3 — Checkpoint", color: "#2471a3"},
    {trou: 6, label: "Trou 6 — Checkpoint", color: "#2471a3"},
    {trou: 9, label: "Trou 9 — Arrivée", color: "#b8913a"}
  ];

  holes.forEach(h => {
    const url = base + "?trou=" + h.trou;
    const div = document.createElement("div");
    div.className = "qr-card";
    div.innerHTML = `
      <canvas id="qr-${h.trou}" width="140" height="140" style="border-radius:8px"></canvas>
      <div class="qr-title" style="color:${h.color}">${h.label}</div>
      <div class="qr-url">${url}</div>
    `;
    grid.appendChild(div);
    drawQR("qr-" + h.trou, url);
  });
}

// QR Code generator (simple, sans librairie externe)
function drawQR(canvasId, text) {
  // On utilise l'API qrcode.js via CDN
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
  script.onload = () => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const container = document.createElement("div");
    new QRCode(container, {
      text: text,
      width: 140,
      height: 140,
      colorDark: "#1a3d0f",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => {
      const img = container.querySelector("img");
      if (img) {
        const ctx = canvas.getContext("2d");
        const i = new Image();
        i.onload = () => ctx.drawImage(i, 0, 0, 140, 140);
        i.src = img.src;
      }
    }, 300);
  };
  if (!window.QRCode) {
    document.head.appendChild(script);
  } else {
    script.onload();
  }
}
</script>
